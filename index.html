<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Framework & Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@700&display=swap');

        :root {
            --turbo-cyan: #00e5ff;
            --bg-canvas: #d1d9e6;
            --navy-deep: #0f172a;
            --warning-red: #ff3b30;
            --kb-gray: #b0b8c4;
            --kb-height: 12px; 
        }

        /* MASTER RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        
        .app-container { width: 100vw; height: 100dvh; background-color: var(--bg-canvas); display: flex; justify-content: center; align-items: center; position: relative; }
        @media (min-width: 450px) { .mobile-frame { width: 420px; height: 850px; border: 12px solid #1e293b; border-radius: 50px; box-shadow: 0 0 120px rgba(0,0,0,1); position: relative; overflow: hidden; background-color: var(--bg-canvas); } }
        @media (max-width: 449px) { .mobile-frame { width: 100%; height: 100%; position: relative; overflow: hidden; background-color: var(--bg-canvas); } }

        .page { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; z-index: 100; 
            overflow: hidden; background-color: var(--bg-canvas); 
        }
        .page.active { display: flex !important; }

        /* ✅ PAGE 1: CLEAN BOLD BLACK TITLE */
        .welcome-title {
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            display: block;
            width: 100%;
            text-shadow: none !important;
            margin-bottom: 20px;
        }

        /* ✅ PAGE 1: BOLD CYAN BORDER CARD */
        .login-card { 
            background: #fff; 
            border-radius: 40px; 
            padding: 45px 30px; 
            box-shadow: none !important; 
            width: 100%; 
            max-width: 330px; 
            text-align: center; 
            border: 5px solid var(--turbo-cyan);
            position: relative;
        }

        .dots-row { display: flex; gap: 12px; height: 12px; margin-bottom: 40px; justify-content: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; transition: 0.3s; }
        .dot.active { background: #000; transform: scale(1.2); }
        
        .btn-main { 
            background: #000; 
            color: var(--turbo-cyan); 
            border: 3px solid var(--turbo-cyan); 
            border-radius: 18px; 
            padding: 16px; 
            width: 100%; 
            font-weight: 900; 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 0 #000; 
            cursor: pointer;
            active:scale-95;
            transition: 0.15s;
        }

        .btn-wa-reg { 
            border: 2.5px solid #22c55e; 
            color: #16a34a; 
            border-radius: 18px; 
            padding: 14px; 
            width: 100%; 
            font-weight: 800; 
            font-size: 9.5px; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            background: #f0fdf4; 
            cursor: pointer;
            box-shadow: 0 3px 0 #16a34a;
        }

        /* ✅ PAGE 2: SEARCH BAR (FIXED ALIGNMENT) */
        .search-bar-container { background: #fff; border: 4px solid #000; border-radius: 18px; margin: 15px; padding: 14px; display: flex; align-items: center; box-shadow: 0 6px 0 #000; }
        #plateDisplay { flex: 1; background: transparent; border: none; color: #000; font-size: 1.6rem; font-weight: 900; font-family: 'Roboto Mono', monospace; text-align: center; outline: none; letter-spacing: 2px; text-transform: uppercase; }

        /* ✅ NEON CYAN TURBO LOADER */
        #global-loader { position: fixed; inset: 0; background: rgba(0, 0, 0, 1); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .neon-spinner { width: 100px; height: 100px; position: relative; display: flex; align-items: center; justify-content: center; }
        .neon-circle { position: absolute; width: 100%; height: 100%; border: 5px solid rgba(0, 229, 255, 0.05); border-top-color: var(--turbo-cyan); border-radius: 50%; animation: spin 0.6s linear infinite; box-shadow: 0 0 25px var(--turbo-cyan); }
        .neon-bolt { color: var(--turbo-cyan); filter: drop-shadow(0 0 15px var(--turbo-cyan)); animation: pulse 0.8s ease-in-out infinite; }
        .turbo-text { color: var(--turbo-cyan); font-weight: 900; font-size: 14px; letter-spacing: 10px; text-transform: uppercase; margin-top: 40px; filter: drop-shadow(0 0 8px var(--turbo-cyan)); animation: blink 1.2s infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.15); opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ✅ PAGE 2: KEYBOARD FEEDBACK */
        .action-bar-hybrid { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: transparent; z-index: 110; }
        .kb-controls { display: flex; gap: 8px; align-items: center; }
        .adj-btn { background: #1e293b; color: #fff; width: 34px; height: 34px; border-radius: 8px; font-weight: 900; display: flex; align-items: center; justify-content: center; active:scale-90; box-shadow: 2px 2px 0 #000; cursor: pointer; }
        .main-tools { display: flex; gap: 6px; }
        .btn-sq-pro { background: #fff; border: 3px solid #000; border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0 #000; color: #000; cursor: pointer; }

        .kb-container { background: var(--kb-gray); padding: 8px; display: flex; flex-direction: column; gap: 4px; border-top: 3.5px solid #1e293b; position: relative; z-index: 110; }
        .kb-row { display: flex; justify-content: center; gap: 3px; width: 100%; }
        .kb-btn { 
            background: #fff; border: 2.2px solid #000; border-radius: 8px; padding: var(--kb-height) 0; 
            flex: 1; font-weight: 900; color: #000; font-size: 14px; box-shadow: 0 3px 0 #000; 
            text-align: center; transition: all 0.05s; cursor: pointer; position: relative;
            user-select: none; -webkit-user-select: none;
        }
        .kb-btn:active { background-color: var(--turbo-cyan); color: #000; transform: scale(0.92) translateY(3px); box-shadow: none; z-index: 10; }

        /* ✅ PAGE 4: OFFICIAL REPORT CARD */
        .official-card { background: #fff; border: 3px solid #000; border-radius: 20px; padding: 25px 20px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: left; overflow-y: auto; max-height: 100%; }
        .doc-header-text { font-size: 11px; font-weight: 900; color: #000; }
        .doc-line { font-weight: 900; color: #cbd5e1; margin: 4px 0 15px 0; letter-spacing: -1px; }
        .section-header-maman { font-size: 13.5px; font-weight: 900; color: #000; margin: 22px 0 10px 0; border-bottom: 1px solid #f1f5f9; padding-bottom: 3px; }
        .row-maman { display: flex; align-items: flex-start; margin-bottom: 4.5px; }
        .label-maman { width: 115px; font-size: 10.5px; font-weight: 500; color: #000; flex-shrink: 0; }
        .sep-maman { width: 15px; font-size: 10.5px; font-weight: 500; color: #000; text-align: center; }
        .val-maman { flex: 1; font-size: 10.8px; font-weight: 800; color: #000; text-transform: uppercase; line-height: 1.4; word-break: break-word; }
        .val-highlight { font-family: 'Roboto Mono', monospace; font-size: 14.5px; color: #000; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-card { background: #fff; border-radius: 35px; padding: 35px; width: 100%; max-width: 350px; text-align: center; border: 4px solid #000; }
        .agent-card-item { background: var(--turbo-cyan); border: 4px solid #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 4px 4px 0 #000; margin-bottom: 12px; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- ✅ NEON CYAN TURBO FAST LOADER -->
    <div id="global-loader">
        <div class="neon-spinner">
            <div class="neon-circle"></div>
            <i data-lucide="zap" class="neon-bolt" size="40"></i>

    </div>
    
    <div id="modalAlert" class="modal-overlay"><div class="modal-card"><h3 id="alertTitle" style="font-weight:900; text-transform:uppercase;"></h3><p id="alertBody" style="font-weight:700; margin:20px 0;"></p><button type="button" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase text-xs" onclick="window.closeAlert()">OKE</button></div></div>

    <div class="app-container">
        <div class="mobile-frame">
            
            <!-- 🔑 HALAMAN 1: LOGIN (BOLD CYAN & BLACK) -->
            <div id="pageLogin" class="page active">
                <div class="flex flex-col items-center justify-center h-full px-5">
                    <div class="mb-10 w-full px-4 text-center"><h1 class="welcome-title text-4xl">SELAMAT DATANG</h1></div>
                    <div class="login-card">
                        <h1 class="text-2xl font-black text-slate-900 mb-2">⚡CSID_PRO</h1>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-10">INPUT PIN AKSES</p>
                        <div class="dots-row" id="loginDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <input type="number" id="pinInput" maxlength="6" inputmode="numeric" style="position:absolute; opacity:0; pointer-events:none;">
                        <button type="button" onclick="window.handleLogin()" class="btn-main">Masuk Aplikasi</button>
                        <button type="button" onclick="window.openRegWA()" class="btn-wa-reg"><i data-lucide="message-circle" size="16"></i> DAFTAR / BELI PIN</button>
                    </div>
                </div>
            </div>

            <!-- 🔍 HALAMAN 2: SEARCH (STABLE LAYOUT) -->
            <div id="pageSearch" class="page">
                <div class="app-header-nav bg-[#1e293b] p-5 border-b-4 border-[#00e5ff] text-white flex items-center justify-between">
                    <div class="flex items-center gap-2"><i data-lucide="shield-check" size="14" class="text-cyan-400"></i><h2 class="text-[11px] font-black uppercase tracking-wider">Samsat Engine</h2></div>
                    <div class="text-right"><p id="uName" class="text-[8px] font-black uppercase">PIN : -</p><p id="uExp" class="text-[8px] font-black uppercase">AKTIF : -</p></div>
                </div>
                <div class="search-bar-container"><input type="text" id="plateDisplay" placeholder="INPUT NOMOR DISINI" readonly></div>
                <div class="flex-1 flex flex-col justify-center px-5"><p class="text-[9px] font-black text-red-500 animate-pulse text-center uppercase tracking-widest mb-4">WARNING ⚠️ DILARANG MENYALAH GUNAKAN APLIKASI !!!</p></div>
                <div class="action-bar-hybrid">
                    <div class="kb-controls"><button type="button" onclick="window.adjustKB(-2)" class="adj-btn">-</button><button type="button" onclick="window.adjustKB(2)" class="adj-btn">+</button></div>
                    <div class="main-tools">
                        <button type="button" onclick="document.getElementById('cam').click()" class="btn-sq-pro" title="Scanner AI"><i data-lucide="camera" size="20"></i></button>
                        <input type="file" id="cam" accept="image/*" capture="environment" class="hidden" onchange="window.handlePhoto(event)">
                        <button type="button" onclick="window.pasteFromClipboard()" class="btn-sq-pro" title="Tempel"><i data-lucide="clipboard-paste" size="20"></i></button>
                        <button type="button" id="adminNav" onclick="window.safeSwitch('pageAdmin')" class="hidden btn-sq-pro" title="Admin"><i data-lucide="shield-check" size="20"></i></button>
                        <button type="button" onclick="location.reload()" class="btn-sq-pro text-red-500" title="Reset"><i data-lucide="power" size="20"></i></button>
                        <button type="button" onclick="window.doSearch()" class="btn-sq-pro" title="Cari"><i data-lucide="search" size="20"></i></button>
                    </div>
                </div>
                <div class="kb-container">
                    <div class="kb-row"><button type="button" class="kb-btn" onpointerdown="window.kAdd('1')">1</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('2')">2</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('3')">3</button><button type="button" class="kb-btn" onpointerdown="window.kDel()"><i data-lucide="delete" class="mx-auto" size="16"></i></button><button type="button" class="kb-btn" onpointerdown="document.getElementById('plateDisplay').value=''">CLR</button></div>
                    <div class="kb-row"><button type="button" class="kb-btn" onpointerdown="window.kAdd('4')">4</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('5')">5</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('6')">6</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('0')">0</button></div>
                    <div class="kb-row"><button type="button" class="kb-btn" onpointerdown="window.kAdd('7')">7</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('8')">8</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('9')">9</button></div>
                    <div class="kb-row mt-1"><button type="button" class="kb-btn" onpointerdown="window.kAdd('Q')">Q</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('W')">W</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('E')">E</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('R')">R</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('T')">T</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('Y')">Y</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('U')">U</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('I')">I</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('O')">O</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('P')">P</button></div>
                    <div class="kb-row"><button type="button" class="kb-btn" onpointerdown="window.kAdd('A')">A</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('S')">S</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('D')">D</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('F')">F</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('G')">G</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('H')">H</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('J')">J</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('K')">K</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('L')">L</button></div>
                    <div class="kb-row"><button type="button" class="kb-btn" onpointerdown="window.kAdd('Z')">Z</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('X')">X</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('C')">C</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('V')">V</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('B')">B</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('N')">N</button><button type="button" class="kb-btn" onpointerdown="window.kAdd('M')">M</button></div>
                </div>
            </div>

            <!-- 🛠 HALAMAN 3: ADMIN -->
            <div id="pageAdmin" class="page">
                <div class="bg-[#1e293b] p-6 border-b-4 border-black flex items-center justify-between text-white"><h2 class="font-black text-xs tracking-widest uppercase">Admin Panel</h2><button type="button" onclick="window.safeSwitch('pageSearch')"><i data-lucide="x"></i></button></div>
                <div class="p-4 flex-1 overflow-y-auto"><button type="button" onclick="window.showAddPin()" class="w-full bg-[#00e5ff] border-4 border-black p-5 rounded-2xl font-black text-xs mb-8 shadow-[4px_4px_0_#000]">AKTIFKAN PIN AGENT BARU</button><div id="agList" class="space-y-4"></div></div>
            </div>

            <!-- 📄 HALAMAN 4: RESULT -->
            <div id="pageResult" class="page bg-[#f1f5f9]">
                <div class="bg-[#1e293b] p-5 border-b-4 border-[#00e5ff] flex items-center text-white"><button type="button" onclick="window.safeSwitch('pageSearch')"><i data-lucide="arrow-left"></i></button><span class="flex-1 text-center font-black uppercase text-xs tracking-widest">HASIL KENDARAAN</span></div>
                <div id="resultArea" class="flex-1 overflow-y-auto p-4"></div>
                <div class="p-5 bg-white border-t space-y-3"><button type="button" id="shareWA" class="w-full bg-[#22c55e] text-white py-5 rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-3"><i data-lucide="share-2"></i> KIRIM KE WHATSAPP PEMILIK</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modalAdd" class="modal-overlay"><div class="modal-card"><h3 class="font-black text-xl mb-6 uppercase">AKTIVASI PIN BARU</h3><input type="number" id="newPVal" class="w-full text-center text-3xl font-black p-4 border-4 border-black rounded-2xl mb-4 outline-none bg-white text-black" placeholder="7254"><p class="text-[9px] font-black text-black/50 mb-2 uppercase tracking-widest text-left">PILIH MASA AKTIF :</p><select id="newPDur" class="w-full p-4 border-4 border-black rounded-2xl mb-6 font-black bg-white outline-none text-center appearance-none"><option value="10">10 Hari</option><option value="15">15 Hari</option><option value="30" selected>30 Hari (1 Bulan)</option><option value="90">3 Bulan</option><option value="180">6 Bulan</option><option value="365">1 Tahun</option></select><button type="button" onclick="window.saveNewPin()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase text-xs mb-3 shadow-lg">Aktifkan Sekarang</button><button type="button" onclick="window.closeAddPin()" class="w-full text-black font-black text-[10px] uppercase text-center mt-3">Batal</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { initializeFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // ✅ CONFIG FIREBASE GOLDEN KEY
        const firebaseConfig = {
            apiKey: "AIzaSyBonuHp4nd-YZKWV5IM_2HRCfJ2TQ4zJaY",
            authDomain: "gen-lang-client-0221970857.firebaseapp.com",
            projectId: "gen-lang-client-0221970857",
            storageBucket: "gen-lang-client-0221970857.firebasestorage.app",
            messagingSenderId: "483674298302",
            appId: "1:483674298302:web:1fe90dc43295df2abecbef",
            measurementId: "G-NQX8N3Y2S8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.titanState = { appId: 'csid-pro-final', currentData: null, userAuth: null, isReady: false, unsubscribe: null };
        window.localCache = {}; 
        const getDeviceId = () => btoa(`${navigator.userAgent}-${window.screen.width}`).slice(0, 32);

        // ✅ REPAIRED GLOBAL FUNCTIONS
        let currentKBH = 12;
        window.adjustKB = (v) => { 
            currentKBH += v; 
            if (currentKBH < 4) currentKBH = 4; 
            if (currentKBH > 28) currentKBH = 28; 
            document.documentElement.style.setProperty('--kb-height', `${currentKBH}px`); 
        };

        // ✅ UPDATED PROFESSIONAL REGISTRATION FORMAT (V373)
        window.openRegWA = () => { 
            const pinReq = Math.floor(100000 + Math.random() * 900000);
            const text = `Halo CSID Pro\nBantu Aktifkan User ini 👇\n• ID : ${pinReq}\n• Paket Masa Aktif: 30 Hari\nMohon aktivasi akun saya segera, dan Proses Pembayaran nya bagaimana?\nTerima Kasih.`;
            window.open(`https://wa.me/628136900872?text=${encodeURIComponent(text)}`, '_blank'); 
        };

        const initAuth = async () => {
            try {
                if (window.titanState.userAuth) return window.titanState.userAuth;
                let userCred;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { userCred = await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { userCred = await signInAnonymously(auth); }
                } else { userCred = await signInAnonymously(auth); }
                window.titanState.userAuth = userCred.user;
                window.titanState.isReady = true;
                return userCred.user;
            } catch(e) { setTimeout(initAuth, 3000); }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => { window.titanState.userAuth = u; if(u && document.getElementById('pageAdmin').classList.contains('active')) loadAgentList(); });

        window.handleLogin = async () => {
            const val = document.getElementById('pinInput').value; if(!val) return;
            if(val === "280189") { proceedUser({username:"ADMIN", role:"admin", expiry:"UNLIMITED"}, "280189"); return; }
            const user = await initAuth(); if (!user) { window.showM("KONEKSI", "Menghubungkan..."); return; }
            window.showL("VERIFIKASI AKSES...");
            try {
                const agentRef = doc(db, 'artifacts', window.titanState.appId, 'public', 'data', 'agents', val);
                const snap = await getDoc(agentRef);
                if(snap.exists()){
                    const d = snap.data(); const dev = getDeviceId();
                    if(d.deviceId && d.deviceId !== dev) window.showM("LOCK", "PIN Terkunci di HP Lain.");
                    else if(new Date(d.expiry) < new Date()) window.showM("EXPIRED", "Masa aktif habis.");
                    else { if(!d.deviceId) await updateDoc(agentRef, { deviceId: dev }); proceedUser(d, val); }
                } else { window.showM("SALAH", "PIN tidak terdaftar."); }
            } catch(e) { window.showM("ERROR", "Cek Domain Firebase bos!"); }
            window.hideL();
        };

        const proceedUser = (u, pin) => {
            document.getElementById('uName').innerText = "PIN : " + pin;
            const sisa = Math.ceil((new Date(u.expiry)-new Date())/86400000);
            document.getElementById('uExp').innerText = u.expiry === "UNLIMITED" ? "AKTIF : UNLIMITED" : "AKTIF : " + (sisa > 0 ? sisa : 0) + " HARI";
            if(u.role === 'admin') document.getElementById('adminNav').classList.remove('hidden');
            window.safeSwitch('pageSearch');
        };

        const loadAgentList = () => {
            if(!auth.currentUser) return;
            const listArea = document.getElementById('agList');
            if(window.titanState.unsubscribe) window.titanState.unsubscribe();
            window.titanState.unsubscribe = onSnapshot(collection(db, 'artifacts', window.titanState.appId, 'public', 'data', 'agents'), (snap) => {
                listArea.innerHTML = "";
                snap.forEach(s => {
                    const d = s.data(); const sisa = Math.ceil((new Date(d.expiry)-new Date())/86400000);
                    listArea.innerHTML += `<div class="agent-card-item"><div class="flex items-center gap-3"><i data-lucide="user"></i><div><div class="font-black text-lg text-black">${d.username}</div><div class="text-[8px] font-black uppercase text-black/60">${sisa>0?sisa+' HARI':'EXP'}</div></div></div><button type="button" onclick="window.delAgent('${s.id}')" class="bg-red-100 text-red-600 border-2 border-red-600 p-2 rounded-lg active:scale-90"><i data-lucide="trash-2"></i></button></div>`;
                });
                lucide.createIcons();
            }, (err) => { listArea.innerHTML = `<div class="p-6 text-center text-red-500 font-black border-2 border-red-500 rounded-2xl bg-white uppercase">Data Terkunci!</div>`; });
        };

        window.saveNewPin = async () => {
            const pV = document.getElementById('newPVal').value.trim();
            const dur = parseInt(document.getElementById('newPDur').value);
            if(!pV) return; 
            window.closeAddPin(); window.showL("TURBO FAST"); 
            try { 
                await initAuth();
                const path = doc(db, 'artifacts', window.titanState.appId, 'public', 'data', 'agents', pV);
                setDoc(path, { username: pV, role: 'agent', expiry: new Date(Date.now() + dur*86400000).toISOString(), deviceId: "", createdAt: new Date().toISOString() })
                .catch(e => console.error("Injection error:", e));
                setTimeout(() => { window.hideL(); window.showM("BERHASIL", `PIN ${pV} Aktif Selama ${dur} Hari.`); }, 500);
            } catch(e) { window.hideL(); window.showM("GAGAL", "Error Permissions!"); }
        };

        window.delAgent = async (id) => { if(confirm("Hapus PIN?")) await deleteDoc(doc(db, 'artifacts', window.titanState.appId, 'public', 'data', 'agents', id)); };

        // ✅ ✅ ✅ TURBO SEARCH ENGINE & ABSOLUTE STITCHER
        window.doSearch = async () => {
            const pInput = document.getElementById('plateDisplay').value.trim().toUpperCase(); if(!pInput) return;
            const pClean = pInput.replace(/[^A-Z0-9]/gi, ''); 
            
            if (window.localCache[pClean]) { renderResult(window.localCache[pClean]); return; }
            window.showL("TURBO FAST");
            try {
                const res = await fetch(`https://elangninja.space/?key=9611bbce88d6dbd96cdfd83619233efb&s=${encodeURIComponent(pClean)}`); 
                const resJson = await res.json();
                
                let d = null;
                if(resJson.data) d = resJson.data;
                else if(Array.isArray(resJson) && resJson.length > 0) d = resJson[0];
                else if(resJson.plat_nomor || resJson.nama_pemilik || resJson.nomor_plat) d = resJson;

                if(d) {
                    window.localCache[pClean] = d; 
                    renderResult(d);
                } else {
                    window.showM("NIHIL", "Data tidak ditemukan di server.");
                }
            } catch(e) { window.showM("ERROR", "Server sibuk."); }
            window.hideL();
        };

        const renderResult = (d) => {
            window.titanState.currentData = d;
            
            // ✅ ✅ ✅ ABSOLUTE STITCHER LOGIC (BK1425ADC)
            const stitchPlate = () => {
                const full = d.plat_nomor || d.nomor_plat || d.plate || d.plate_no || '';
                const parts = (d.wilayah_plat || d.plate_region || '') + 
                              (d.nomor_plat || d.plate_number || d.plat_nomor || d.plate || '') + 
                              (d.seri_plat || d.plate_series || '');
                const result = parts.length > full.length ? parts : full;
                return result.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            };

            const f = {
                nopol: stitchPlate() || '-',
                nama: d.nama_pemilik || d.owner_name || d.name || '-',
                nik: d.no_ktp || d.nik || d.owner_id || d.id_number || '-',
                kerja: d.pekerjaan_pemilik || d.pekerjaan || d.owner_job || d.occupation || '-',
                alamat: (d.alamat || d.owner_address || d.address || '-').replace('- //', '').trim(),
                hp: d.nomor_telepon || d.no_hp || d.owner_phone || d.phone || '-',
                
                // DEEP SCAN: YEAR & COLOR
                merk: d.merek || d.merk || d.vehicle_brand || d.brand || '-',
                tipe: d.tipe_kendaraan || d.tipe_model || d.vehicle_type || '-',
                tahun: d.tahun_pembuatan || d['tahun pembuatan'] || d.vehicle_year || d.year || d.tahun || d.thn || '-',
                warna: d.warna || d['warna kendaraan'] || d['warna'] || d.vehicle_color || d.color || d.cat || '-',
                
                silinder: (d.kapasitas_mesin_cc || d.isi_silinder || d.engine_capacity || d.cc || '-') + ' cc',
                roda: d.jumlah_roda || d.wheel_count || d.roda || '0',
                
                // DOCUMENT RECOVERY
                rangka: d.nomor_sasis || d.no_rangka || d.chassis_number || d.chassis || '-',
                mesin: d.nomor_mesin || d.no_mesin || d.engine_number || d.engine || '-',
                bpkb: d.nomor_bpkb || d.no_bpkb || d.bpkb_number || d.bpkb || '-',
                stnk: d.stnk_number || d.nomor_stnk || d.no_stnk || d.stnk || '-',
                tgl_daftar: d.tanggal_pendaftaran || d.tanggal_daftar || d.registration_date || "2019-01-10 00:00:00"
            };
            
            document.getElementById('resultArea').innerHTML = `
                <div class="official-card">
                    <div class="doc-header-text">Sumber : Aplikasi csid_pro</div>
                    <div class="doc-line">---------------------------------</div>
                    
                    <div class="section-header-maman">IDENTITAS PEMILIK : 🖋️</div>
                    <div class="row-maman"><div class="label-maman">No. Polisi</div><div class="sep-maman">:</div><div class="val-maman val-highlight">${f.nopol}</div></div>
                    <div class="row-maman"><div class="label-maman">Pemilik</div><div class="sep-maman">:</div><div class="val-maman">${f.nama}</div></div>
                    <div class="row-maman"><div class="label-maman">Alamat</div><div class="sep-maman">:</div><div class="val-maman" style="font-weight: 500; font-size: 10px; text-transform:none;">${f.alamat}</div></div>
                    <div class="row-maman"><div class="label-maman">Nik</div><div class="sep-maman">:</div><div class="val-maman">${f.nik}</div></div>
                    <div class="row-maman"><div class="label-maman">Pekerjaan</div><div class="sep-maman">:</div><div class="val-maman">${f.kerja}</div></div>
                    <div class="row-maman"><div class="label-maman">No. HP</div><div class="sep-maman">:</div><div class="val-maman">${f.hp}</div></div>
                    
                    <div class="section-header-maman">DATA KENDARAAN: 🖋️</div>
                    <div class="row-maman"><div class="label-maman">Merek</div><div class="sep-maman">:</div><div class="val-maman">${f.merk}</div></div>
                    <div class="row-maman"><div class="label-maman">Tipe</div><div class="sep-maman">:</div><div class="val-maman">${f.tipe}</div></div>
                    <div class="row-maman"><div class="label-maman">Tahun</div><div class="sep-maman">:</div><div class="val-maman">${f.tahun}</div></div>
                    <div class="row-maman"><div class="label-maman">Warna</div><div class="sep-maman">:</div><div class="val-maman">${f.warna}</div></div>
                    <div class="row-maman"><div class="label-maman">Silinder</div><div class="sep-maman">:</div><div class="val-maman">${f.silinder}</div></div>
                    <div class="row-maman"><div class="label-maman">Roda</div><div class="sep-maman">:</div><div class="val-maman">${f.roda}</div></div>
                    <div class="row-maman"><div class="label-maman">No. Rangka</div><div class="sep-maman">:</div><div class="val-maman" style="font-family:monospace;">${f.rangka}</div></div>
                    <div class="row-maman"><div class="label-maman">No. Mesin</div><div class="sep-maman">:</div><div class="val-maman" style="font-family:monospace;">${f.mesin}</div></div>

                    <div class="section-header-maman">DOKUMEN RESMI : 🖋️</div>
                    <div class="row-maman"><div class="label-maman">No. Bpkb</div><div class="sep-maman">:</div><div class="val-maman">${f.bpkb}</div></div>
                    <div class="row-maman"><div class="label-maman">No. Stnk</div><div class="sep-maman">:</div><div class="val-maman">${f.stnk}</div></div>
                    <div class="row-maman"><div class="label-maman">Tanggal Daftar</div><div class="sep-maman">:</div><div class="val-maman">${f.tgl_daftar}</div></div>

                    <p class="text-[11px] font-black text-slate-800 mt-8 text-center uppercase">NOTE : ⚠️</p>
                    <p class="text-[9px] font-bold text-slate-700 leading-relaxed uppercase bg-slate-50 p-3 rounded-xl border border-slate-200 mt-2 text-center">
                        ALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN.
                    </p>
                    
                    <div class="border-t-2 border-dashed border-slate-200 text-center pt-5 mt-8">
                        <p class="text-[11px] font-black text-slate-900 uppercase">CP Link Aplikasi : CS.ID 👥</p>
                        <p class="text-[11px] font-bold text-blue-600">https://wa.me/628136900872</p>
                    </div>
                </div>`;

            // ✅ WHATSAPP INJECTION
            document.getElementById('shareWA').onclick = () => {
                const cleanHP = f.hp.replace(/\D/g, '');
                let targetHP = cleanHP;
                if(targetHP.startsWith('0')) targetHP = '62' + targetHP.slice(1);
                const text = `Sumber : Aplikasi csid_pro\n\nIDENTITAS PEMILIK : 🖋️\nNo. Polisi\t: ${f.nopol}\nPemilik\t\t: ${f.nama}\nAlamat\t\t: ${f.alamat}\nNik\t\t\t: ${f.nik}\nPekerjaan\t: ${f.kerja}\nNo. HP\t\t: ${f.hp}\n\nDATA KENDARAAN: 🖋️\nMerek\t\t: ${f.merk}\nTipe\t\t\t: ${f.tipe}\nTahun\t\t: ${f.tahun}\nWarna\t\t: ${f.warna}\nSilinder\t: ${f.silinder}\nRoda\t\t: ${f.roda}\nNo. Rangka\t: ${f.rangka}\nNo. Mesin\t: ${f.mesin}\n\nDOKUMEN RESMI : 🖋️\nNo. Bpkb\t: ${f.bpkb}\nNo. Stnk\t: ${f.stnk}\nTanggal Daftar : ${f.tgl_daftar}\n\nNOTE : ⚠️\n\nALAT DI BUAT UNTUK MENGAKSES IDENTITAS RESMI KEPEMILIKAN KENDARAAN YANG SAH SESUAI TNKB RESMI PADA KENDARAAN.\n\nCP Link Aplikasi : CS.ID 👥\nhttps://wa.me/628136900872`;
                const waUrl = targetHP && targetHP.length > 5 ? `https://wa.me/${targetHP}?text=${encodeURIComponent(text)}` : `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(waUrl, '_blank'); 
            };
            window.safeSwitch('pageResult');
            window.hideL();
        };

        window.handlePhoto = async (event) => {
            const file = event.target.files[0]; if (!file) return;
            window.showL("TURBO FAST");
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = async () => {
                const b64 = reader.result.split(',')[1];
                const geminiApiKey = ""; 
                const payload = { contents: [{ role: "user", parts: [{ text: "Extract license plate, chassis, or engine number. Result only." }, { inlineData: { mimeType: "image/png", data: b64 } }] }] };
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const r = await res.json(); const ext = r.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                    if (ext && ext.length > 3) { document.getElementById('plateDisplay').value = ext; window.doSearch(); }
                } catch (e) {} window.hideL();
            };
        };

        window.safeSwitch = (id) => {
            if(window.titanState.unsubscribe) { try { window.titanState.unsubscribe(); } catch(e) {} window.titanState.unsubscribe = null; }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'pageAdmin' && auth.currentUser) loadAgentList();
            lucide.createIcons();
        };

        window.showL = (m) => { document.getElementById('loader-text').innerText = m; document.getElementById('global-loader').style.display = 'flex'; };
        window.hideL = () => { document.getElementById('global-loader').style.display = 'none'; };
        window.showM = (t, b) => { document.getElementById('alertTitle').innerText = t; document.getElementById('alertBody').innerText = b; document.getElementById('modalAlert').style.display = 'flex'; };
        window.closeAlert = () => { document.getElementById('modalAlert').style.display = 'none'; };
        window.showAddPin = () => { document.getElementById('modalAdd').style.display = 'flex'; };
        window.closeAddPin = () => { document.getElementById('modalAdd').style.display = 'none'; };

        // ✅ KEYBOARD LOGIC WITH HAPTIC FEEDBACK
        window.kAdd = (v) => { 
            if(navigator.vibrate) navigator.vibrate(15);
            document.getElementById('plateDisplay').value += v; 
        };
        window.kDel = () => { 
            if(navigator.vibrate) navigator.vibrate(10);
            document.getElementById('plateDisplay').value = document.getElementById('plateDisplay').value.slice(0,-1); 
        };
        window.pasteFromClipboard = async () => { try { const t = await navigator.clipboard.readText(); if(t) document.getElementById('plateDisplay').value = t.toUpperCase(); } catch(e) { document.execCommand('paste'); } };

        const pinIn = document.getElementById('pinInput');
        const dots = document.querySelectorAll('#loginDots .dot');
        document.getElementById('loginDots').onclick = () => pinIn.focus();
        pinIn.oninput = (e) => {
            const val = e.target.value; dots.forEach((d, i) => i < val.length ? d.classList.add('active') : d.classList.remove('active'));
            if(val.length === 6) window.handleLogin();
        };
        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
